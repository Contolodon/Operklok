name: Build DTBO Overclock Overlay (GPU/UFS/RAM)

on:
  workflow_dispatch:
    inputs:
      dtbo_source_url:
        description: 'URL stock DTBO (kosongkan untuk upload manual di repo)'
        required: false
      gpu_max_freq:
        description: 'GPU Max Frequency MHz'
        required: true
        default: '900'
      gpu_opp0_voltage:
        description: 'GPU OPP0 Voltage (uV)'
        required: true
        default: '520000'
      gpu_opp1_voltage:
        description: 'GPU OPP1 Voltage (uV)'
        required: true
        default: '700000'
      gpu_opp2_voltage:
        description: 'GPU OPP2 Voltage (uV)'
        required: true
        default: '820000'
      ufs_max_gear:
        description: 'UFS Max Gear'
        required: true
        default: '4'
      ufs_hs_mode:
        description: 'UFS HS Mode'
        required: true
        default: 'HS'
      ddr_max_bw:
        description: 'DDR/Interconnect Max Bandwidth'
        required: true
        default: '6000000'
      overlay_name:
        description: 'Nama file overlay'
        required: true
        default: 'garnet-oc'

jobs:
  build-dtbo:
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Install Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y device-tree-compiler python3 python3-pip
          pip3 install libfdt

      - name: Build DTBO Overlay
        run: |
          mkdir -p workdir && cd workdir
          # Logic download stock DTBO dari screenshot
          if [ -n "${{ github.event.inputs.dtbo_source_url }}" ]; then
            curl -L "${{ github.event.inputs.dtbo_source_url }}" -o stock_dtbo.img
          else
            cp ../dtbo/stock_dtbo.img stock_dtbo.img
          fi
          
          # Dump DTBO ke DTS agar bisa dianalisis
          dtc -I dtb -O dts stock_dtbo.img > stock_dtbo.dts

          # Generate Overclock Overlay DTS (Sesuai source screenshot)
          cat << 'EOF' > overclock_overlay.dts
          /dts-v1/;
          /plugin/;
          / {
              compatible = "xiaomi,garnet", "qcom,holi", "qcom,garnet";
              
              fragment@0 {
                  target = <&msm_gpu>;
                  __overlay__ {
                      qcom,gpu-freq-tbl = <${{ github.event.inputs.gpu_max_freq }}000000 0>;
                      operating-points-v2 = <&gpu_opp_table>;
                  };
              };
              fragment@1 {
                  target = <&msm_gpu>;
                  __overlay__ {
                      gpu_opp_table: opp-table {
                          opp-2 {
                              opp-hz = /bits/ 64 <${{ github.event.inputs.gpu_max_freq }}000000>;
                              opp-microvolt = <${{ github.event.inputs.gpu_opp2_voltage }}>;
                          };
                      };
                  };
              };
          };
          EOF

          # Compile ke DTBO
          dtc -I dts -O dtb -o overclock_overlay.dtbo overclock_overlay.dts

      - name: Create AnyKernel3 Flasher
        run: |
          git clone --depth=1 https://github.com/osm0sis/AnyKernel3 AnyKernel3
          cp workdir/overclock_overlay.dtbo AnyKernel3/dtbo/
          
          # Custom script flash (inject DTBO)
          cat << 'EOF' > AnyKernel3/anykernel.sh
          # AnyKernel3 Setup
          properties() { 'do.devicecheck=1'; 'device.name1=garnet'; }
          . tools/ak3-core.sh
          
          # Flash DTBO
          flash_part dtbo overclock_overlay.dtbo
          EOF
          
          cd AnyKernel3
          zip -r9 ../DTBO-OC-${{ github.event.inputs.overlay_name }}.zip *

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: DTBO-OC-Overlay
          path: DTBO-OC-*.zip
          
