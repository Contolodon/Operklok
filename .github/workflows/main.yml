name: Build CPU Overclock Module (Real HW LUT Injection)

on:
  workflow_dispatch:
    inputs:
      cpu_silver_max_freq: 
        description: 'CPU Silver (LITTLE) Max Freq Khz'
        required: true
        default: '2000000'
      cpu_gold_max_freq:
        description: 'CPU Gold (big) Max Freq kHz'
        required: true
        default: '2500000'

jobs:
  build-cpu-oc-module:
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Environment
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential gcc-aarch64-linux-gnu curl unzip

      - name: Clone Kernel Source
        run: |
          git clone --depth=1 https://github.com/ramabondanp/android_kernel_common-5.10.git kernel_source

      - name: Compile Module
        run: |
          cd kernel_source
          make ARCH=arm64 CROSS_COMPILE=aarch64-linux-gnu- gki_defconfig
          make ARCH=arm64 CROSS_COMPILE=aarch64-linux-gnu- prepare
          make ARCH=arm64 CROSS_COMPILE=aarch64-linux-gnu- modules_prepare
          
          cd ..
          mkdir -p cpu_oc_module
          cat << 'EOF' > cpu_oc_module/garnet_cpu_oc.c
          #include <linux/module.h>
#include <linux/kernel.h>
#include <linux/cpufreq.h>
#include <linux/kprobes.h>
#include <linux/set_memory.h>
#include <linux/kallsyms.h> // Tambahkan ini untuk pencarian simbol dinamis

static struct kprobe kp = { 
    .symbol_name = "qcom_cpufreq_hw_cpu_init" 
};

static int handler_post(struct kprobe *p, struct pt_regs *regs, unsigned long flags) {
    // Pastikan regs valid sebelum akses
    if (!regs) return 0;

    struct cpufreq_policy *policy = (struct cpufreq_policy *)regs->regs[0];

    // Validasi pointer policy sebelum akses memori
    if (policy && policy->freq_table) {
        // Cek apakah tabel frekuensi berada di rentang memori yang diizinkan
        // Menambahkan perlindungan agar tidak memori yang bukan milik tabel
        if (policy->freq_table[2].frequency < 3000000) { 
            set_memory_rw((unsigned long)policy->freq_table, 1);
            
            policy->freq_table[2].frequency = 2500000;
            
            set_memory_ro((unsigned long)policy->freq_table, 1);
            pr_info("Garnet OC: Tabel berhasil di-patch ke 2500MHz!\n");
        }
    }
    return 0;
}

static int __init m_init(void) {
    // Jika symbol_name gagal, kita coba cari alamatnya secara manual
    if (kp.addr == NULL) {
        kp.addr = (kprobe_opcode_t *)kallsyms_lookup_name("qcom_cpufreq_hw_cpu_init");
    }

    if (kp.addr == NULL) {
        pr_err("Garnet OC: Gagal menemukan alamat fungsi!\n");
        return -EINVAL;
    }

    kp.post_handler = handler_post;
    return register_kprobe(&kp);
}

static void __exit m_exit(void) {
    unregister_kprobe(&kp);
}

module_init(m_init);
module_exit(m_exit);
MODULE_LICENSE("GPL");

          

      - name: Package KernelSU Module
        run: |
          mkdir -p ksu_module/garnet_cpu_oc
          cp cpu_oc_module/garnet_cpu_oc.ko ksu_module/garnet_cpu_oc/
          
          echo -e "id=garnet_cpu_oc\nname=Garnet CPU Overclock (HW Inject)\nversion=1.1\nauthor=Ridwan Farel\ndescription=Modul Kprobe LUT Injection." > ksu_module/garnet_cpu_oc/module.prop
          
          cd ksu_module
          zip -r9 ../KSU-Garnet-OC.zip *

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: KSU-Garnet-OC
          path: KSU-Garnet-OC.zip
          
