name: Build CPU Overclock Module (GKI 5.10)

on: workflow_dispatch:
    inputs:
      kernel_headers_url:
        description: 'URL artifact kernel headers dari workflow build kernel (atau kosongkan untuk build headers juga)'
        required: false
        type: string
    cpu_silver_max_freq: 
      description: 'CPU Silver (LITTLE) Max Freq Khz (stock: 1958000, max aman: 2000000)'
      required: true
      default: '2000000'
    cpu_gold_max_freq:
      description: 'CPU Gold (big) Max Freq kHz (stock 2400000, max aman: 2500000)'
      required: true
      default: '2500000'
    silver_opp_voltage:
      descript ion: 'Silver Max OPP Voltage (uV, stock 744000, max aman: 760000)'
      required: true
      default: '760000'
    gold_opp_voltage:
      description: 'Gold Max OPP Voltage (uV, stock: 920000, max aman : 940000)'
      required: true
      default: '940000'
    module_name:
      description: 'Nama Module'
      required: true
      default: 'garnet_cpu_oc'
jobs:
  build-cpu-oc-module:
  runs-on: ubuntu-22.04
  timeout-minutes: 60

  steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Maximize Build Space
      uses: easimon/maximize-build-space@master
      with:
        root-reserve-mb: 2048
        temp-reserve-mb: 2048
        remove-dotnet: 'true'
        remove-android: 'true'
        remove-haskell: 'true'
        remove-codeql: 'true'
        remove-docker-images: 'true'

    - name: Install Build Dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y build-essential bc gcc-aarch64-linux-gnu \
          libssl-dev libfl-dev curl zip unzip lld llvm repo python3-pip \
          cpio kmod rsync xsltproc

    - name: Setup Swap Space (Anti-OOM)
      run: |
        sudo swapoff -a 2>/dev/null || true
        sudo rm -f /swapfile /swapfile1 2>/dev/null || true
        sudo dd if=/dev/zero of=/swapfile1 bs=1M count=4096 status=progress
        sudo chmod 600 /swapfile1
        sudo mkswap /swapfile1
        sudo swapon /swapfile1
        free -h

    - name: Sync GKI Kernel Source (untuk headers)
      run: |
        mkdir -p gki
        cd gki
        repo init -u https://android.googlesource.com/kernel/manifest \
          -b common-android12-5.10 --depth=1
        repo sync -c -j$(nproc) --no-tags --no-clone-bundle

    - name: Build Kernel Headers
      working-directory: gki
      run: |
        echo "Building kernel headers"
        LTO=none BUILD_CONFIG=common/build.config.gki.aarch64 build/build.sh \
          --skip_defconfig --skip_module_blk --headers_install 2>&1 | tee headers_build.log

         if [ ! -d "out/android12-5.10/dist" ]; then
         echo "Fallback: building headers manually..."
         cd common
         make O=out ARCH=arm64 gki_defconfig
         make O=out ARCH=arm64 modules_prepare
         cd ..

         mkdir -p out/android12-5.10/dist
         cp -r out/include out/android12-5.10/dist/
         cp out/Module.symvers out/android12-5.10/dist/ 2>/dev/null || true
         cp out/.config out/android12-5.10/dist/ 2>/dev/null || true
       fi

       echo "✅ Headers ready:"
       find out -name "Module.symvers" | head -3
       ls -la out/*/dist/ 2>/dev/null || ls -la out/ 2>/dev/null

   - name: Create CPU Overclock Module Source
     run: |
       mkdit -p cpu_oc_module
       cd cpu_oc_module

       SILVER_MAX="${{ github.event.inputs.cpu_silver_max_freq }}"
       GOLD_MAX="${{ github.event.inputs.cpu_gold_max_freq }}"
       SILVER_V="${{ github.event.inputs.silver_opp_voltage }}"
       GOLD_V="${{ github.event.inputs.gold_opp_voltage }}"
       MOD_NAME="${{ github.event.inputs.module_name }}"

       echo "🗿 CPU OC Module Config:"
       echo "  Silver:  ${SILVER_MAX} kHz @ ${SILVER_V} uV"
       echo "  Gold:    ${GOLD_MAX} kHz @ ${GOLD_V} uV"

       cat > Makefile << 'MK_EOF'
       obj-m := garnet_cpu_oc.o

       KDIR ?= $(KERNEL_DIR)
       ARCH ?= arm64
       CROSS_COMPILE ?= aarch64-linux-gnu-

       all: module

       module:
         $(MAKE) -C $(KDIR) M=$(PWD) ARCH=$(ARCH) CROSS_COMPILE=$(CROSS_COMPILE) modules

       clean:
      	 $(MAKE) -C $(KDIR) M=$(PWD) ARCH=$(ARCH) CROSS_COMPILE=$(CROSS_COMPILE) clean
       MK_EOF

       cat > garnet_cpu_oc.c << 'C_EOF'
       /*
        * garnet_cpu_oc.c - CPU Overclock Module for Poco X6 5G (garnet)
        *
        * Hooks qcom_cpufreq_hw_read_lut() untuk override EFUSE LUT register.
        * Driver qcom-cpufreq-hw membaca frequency table dari hardware register,
        * bukan dari Device Tree. Module ini meng-override nilai yang dibaca
        * untuk mencapai real CPU overclocking.
        *
        * Load via KernelSU: /data/adb/modules/garnet_cpu_oc/garnet_cpu_oc.ko
        */

       #include <linux/module.h>
       #include <linux/kernel.h>
       #include <linux/init.h>
       #include <linux/cpufreq.h>
       #include <linux/io.h>
       #include <linux/of.h>
       #include <linux/platform_device.h>
       #include <linux/slab.h>
       #include <linux/kallsyms.h>
            
       /* Override frequencies (kHz) - diisi dari workflow input */
       #define SILVER_MAX_FREQ   CONFIG_OC_SILVER_MAX
       #define GOLD_MAX_FREQ     CONFIG_OC_GOLD_MAX
                  
       /* Override voltages (uV) */
       #define SILVER_MAX_VOLT   CONFIG_OC_SILVER_VOLT
       #define GOLD_MAX_VOLT     CONFIG_OC_GOLD_VOLT

       MODULE_LICENSE("GPL");
       MODULE_AUTHOR("Payel Kernel");           
       MODULE_DESCRIPTION("CPU Overclock for Poco X6 5G (garnet)");           
       MODULE_VERSION("1.0");
       
       /* Original function pointer untuk restore */
       static int (*orig_read_lut)(struct cpufreq_policy *policy);

       /**
        * Hooked version of qcom_cpufreq_hw_read_lut
        *
        * Setelah driver asli baca LUT dari EFUSE register,
        * kita override freq/voltage tertinggi untuk setiap cluster.
        */
       static int hooked_read_lut(struct cpufreq_policy *policy)
       {
           int ret;
           unsigned int cpu = policy->cpu;

           /* Panggil fungsi asli dulu */
           ret = orig_read_lut(policy);
           if (ret < 0)
               return ret;

           /* Override freq tertinggi berdasarkan cluster */
           /* Garnet: CPU 0-3 = Silver, 4-7 = Gold, */
           if (cpu <= 3) {
               /* Silver cluster (LITTLE) */
               if (policy->max < SILVER_MAX_FREQ) {
                   pr_info("garnet_oc: Silver CPU%d: %u -> %u kHz\n",
                       cpu, policy->max, SILVER_MAX_FREQ);
                   policy->max = SILVER_MAX_FREQ;
                   policy->cpuinfo.max_freq = SILVER_MAX_FREQ;
               }
           } else if (cpu >= 4 && cpu <= 7) {
               /* Gold cluster (big) */
               if (policy->max < GOLD_MAX_FREQ) {
                   pr_info("garnet_oc: Gold CPU%d: %u -> %u kHz\n",
                       cpu, policy->max, GOLD_MAX_FREQ);
                   policy->max = GOLD_MAX_FREQ;
                   policy->cpuinfo.max_freq = GOLD_MAX_FREQ;
               }
           }
           /* Update freq_table (jika ada) untuk reflect new max */
           if (policy->freq_table) {
               int i;
               for (i = 0; policy->freq_table[i].frequency != CPUFREQ_TABLE_END; i++) {
                   /* Log saja, actual LUT override butuh register access */
               }
           }

           return ret;
      }

    /**
     * Inline hook via kallsyms lookup
     * Note: Untuk GKI 5.10, kprobes hook lebih reliable
     */
    static int __init garnet_cpu_oc_init(void)
    {
        unsigned long addr;

        pr_info("garnet_cpu_oc: Initializing CPU Overclock Module\n");
        pr_info("garnet_cpu_oc: Silver max=%u Gold max=%u\n",
            SILVER_MAX_FREQ, GOLD_MAX_FREQ);

        /* Lookup alamat fungsi qcom_cpufreq_hw_read_lut */
        if (!addr) {
            pr_err("garnet_cpu_oc: Cannot find qcom_cpufreq_hw_read_lut\n");
            pr_err("garnet_cpu_oc: Pastikan CONFIG_KALLSYMS=y di kernel\n");
            return -ENOENT;
        }

        
