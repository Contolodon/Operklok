name: Build CPU Overclock Module (Real HW LUT Injection)

on:
  workflow_dispatch:
    inputs:
      cpu_silver_max_freq: 
        description: 'CPU Silver (LITTLE) Max Freq Khz'
        required: true
        default: '2000000'
      cpu_gold_max_freq:
        description: 'CPU Gold (big) Max Freq kHz'
        required: true
        default: '2500000'

jobs:
  build-cpu-oc-module:
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Environment
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential gcc-aarch64-linux-gnu curl unzip

      - name: Clone Kernel Source
        run: |
          git clone --depth=1 https://github.com/ramabondanp/android_kernel_common-5.10.git kernel_source

      - name: Compile Module
        run: |
          # 1. Masuk ke direktori kernel source
          cd kernel_source
          
          # 2. Siapkan konfigurasi kernel (Wajib agar auto.conf terbentuk)
          # Menggunakan defconfig untuk konfigurasi standar (bisa diganti jika punya file .config khusus)
          make ARCH=arm64 CROSS_COMPILE=aarch64-linux-gnu- vendor/garnet_defconfig
          make ARCH=arm64 CROSS_COMPILE=aarch64-linux-gnu- prepare
          
          # 3. Kembali ke folder modul untuk kompilasi
          cd ..
          mkdir -p cpu_oc_module
          # (Tambahkan perintah untuk membuat file garnet_cpu_oc.c dan Makefile di sini seperti sebelumnya)
          
          # 4. Compile modul
          make -C kernel_source M=$(pwd)/cpu_oc_module ARCH=arm64 CROSS_COMPILE=aarch64-linux-gnu- modules
          

      - name: Package KernelSU Module
        run: |
          mkdir -p ksu_module/garnet_cpu_oc
          cp cpu_oc_module/garnet_cpu_oc.ko ksu_module/garnet_cpu_oc/
          
          echo -e "id=garnet_cpu_oc\nname=Garnet CPU Overclock (HW Inject)\nversion=1.1\nauthor=Ridwan Farel\ndescription=Modul Kprobe LUT Injection." > ksu_module/garnet_cpu_oc/module.prop
          
          cd ksu_module
          zip -r9 ../KSU-Garnet-OC.zip *

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: KSU-Garnet-OC
          path: KSU-Garnet-OC.zip
          
