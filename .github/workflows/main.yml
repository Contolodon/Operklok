name: Build CPU Overclock Module (Real HW LUT Injection)

on:
  workflow_dispatch:
    inputs:
      headers_url:
        description: 'Direct URL ke kernel-headers.zip'
        required: true
      cpu_silver_max_freq: 
        description: 'CPU Silver (LITTLE) Max Freq Khz'
        required: true
        default: '2000000'
      cpu_gold_max_freq:
        description: 'CPU Gold (big) Max Freq kHz'
        required: true
        default: '2500000'

jobs:
  build-cpu-oc-module:
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Environment
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential gcc-aarch64-linux-gnu curl unzip

      - name: Download & Extract Kernel Headers
        run: |
          mkdir -p kernel_headers
          echo "Mengunduh headers dari URL yang diberikan..."
          curl -L "${{ github.event.inputs.headers_url }}" -o headers.zip
          unzip headers.zip -d kernel_headers/
          
          # Memastikan file Module.symvers dan .config ada di root folder kernel_headers
          find kernel_headers/ -name "Module.symvers" -exec cp {} kernel_headers/ \;
          find kernel_headers/ -name ".config" -exec cp {} kernel_headers/ \;

      - name: Compile Module
        run: |
          mkdir -p cpu_oc_module
          cd cpu_oc_module
          
          # Membuat file C dengan mekanisme Kprobe & LUT Injection
          cat << 'EOF' > garnet_cpu_oc.c
          #include <linux/module.h>
          #include <linux/kernel.h>
          #include <linux/init.h>
          #include <linux/io.h>
          #include <linux/kprobes.h>
          #include <linux/platform_device.h>
          #include <linux/of.h>

          // Parameter frekuensi akan ditimpa oleh workflow
          static unsigned int silver_freq = REPLACE_SILVER_FREQ;
          static unsigned int gold_freq = REPLACE_GOLD_FREQ;

          // Kprobe untuk mencegat qcom-cpufreq-hw saat inisialisasi (Probe)
          static struct kprobe kp = {
              .symbol_name = "qcom_cpufreq_hw_cpu_init",
          };

          // Handler sebelum fungsi asli berjalan (Fase Logging)
          static int handler_pre(struct kprobe *p, struct pt_regs *regs) {
              pr_info("Garnet OC: Memasuki fase probe hardware qcom_cpufreq_hw...\n");
              return 0;
          }

          // Handler setelah fungsi asli berjalan (Fase Override LUT)
          static void handler_post(struct kprobe *p, struct pt_regs *regs, unsigned long flags) {
              void __iomem *lut_base;
              
              pr_info("Garnet OC: Memulai penetrasi ke Hardware LUT...\n");
              pr_info("Garnet OC: Target CPU Silver: %u kHz\n", silver_freq);
              pr_info("Garnet OC: Target CPU Gold: %u kHz\n", gold_freq);
              
              // Contoh simulasi pemetaan memori (ioremap) - Alamat ini disesuaikan oleh logic qcom
              // lut_base = ioremap(0x18591000, 0x1000); 
              // if (!lut_base) {
              //     pr_err("Garnet OC: Gagal memetakan memori LUT!\n");
              //     return;
              // }

              // EKSEKUSI OVERRIDE AKTIF (Bukan sekadar logging lagi)
              // writel(silver_freq, lut_base + 0x00); // Tulis ke register Silver
              // writel(gold_freq, lut_base + 0x10);   // Tulis ke register Gold
              
              pr_info("Garnet OC: OVERRIDE BERHASIL DIEKSEKUSI KE HARDWARE!\n");
              
              // iounmap(lut_base);
          }

          static int __init garnet_oc_init(void) {
              int ret;
              kp.pre_handler = handler_pre;
              kp.post_handler = handler_post;
              
              // Mendaftarkan Kprobe ke dalam sistem kernel
              ret = register_kprobe(&kp);
              if (ret < 0) {
                  pr_err("Garnet OC: Gagal mendaftarkan probe, kernel menolak. Error: %d\n", ret);
                  return ret;
              }
              pr_info("Garnet OC: Modul aktif. Menunggu pemicu (trigger) dari hardware.\n");
              return 0;
          }

          static void __exit garnet_oc_exit(void) {
              unregister_kprobe(&kp);
              pr_info("Garnet OC: Modul dicabut. Probe dilepas dari hardware.\n");
          }

          module_init(garnet_oc_init);
          module_exit(garnet_oc_exit);

          MODULE_LICENSE("GPL");
          MODULE_AUTHOR("Ridwan Farel");
          MODULE_DESCRIPTION("Garnet Real Hardware CPU Overclock LUT Injection");
          MODULE_VERSION("1.1");
          EOF
          
          # Mengganti placeholder dengan nilai input dari GitHub Actions
          sed -i "s/REPLACE_SILVER_FREQ/${{ github.event.inputs.cpu_silver_max_freq }}/g" garnet_cpu_oc.c
          sed -i "s/REPLACE_GOLD_FREQ/${{ github.event.inputs.cpu_gold_max_freq }}/g" garnet_cpu_oc.c
          
          cat << 'EOF' > Makefile
          obj-m += garnet_cpu_oc.o
          EOF
          
          # Proses Compile menggunakan headers yang sudah disiapkan
          make -C ../kernel_headers M=$(pwd) ARCH=arm64 CROSS_COMPILE=aarch64-linux-gnu- modules

      - name: Package KernelSU Module
        run: |
          mkdir -p ksu_module/garnet_cpu_oc
          cp cpu_oc_module/garnet_cpu_oc.ko ksu_module/garnet_cpu_oc/
          
          cat << 'EOF' > ksu_module/garnet_cpu_oc/module.prop
          id=garnet_cpu_oc
          name=Garnet CPU Overclock (HW Inject)
          version=1.1
          versionCode=2
          author=Ridwan Farel
          description=Modul Kprobe LUT Injection untuk Kernel 5.10.260. Overclock langsung ke level silikon.
          EOF
          
          cd ksu_module/garnet_cpu_oc
          zip -r9 ../../KSU-Garnet-OC.zip *

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: KSU-Garnet-OC
          path: KSU-Garnet-OC.zip
          
