name: Build CPU Overclock Module (Real HW LUT Injection)

on:
  workflow_dispatch:
    inputs:
      cpu_silver_max_freq: 
        description: 'CPU Silver (LITTLE) Max Freq Khz'
        required: true
        default: '2000000'
      cpu_gold_max_freq:
        description: 'CPU Gold (big) Max Freq kHz'
        required: true
        default: '2500000'

jobs:
  build-cpu-oc-module:
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Environment
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential gcc-aarch64-linux-gnu curl unzip

      - name: Clone Kernel Source
        run: |
          git clone --depth=1 https://github.com/ramabondanp/android_kernel_common-5.10.git kernel_source

      - name: Compile Module
        run: |
          # 1. Pastikan folder modul ada dan bersih
          mkdir -p cpu_oc_module
          
          # 2. Buat file .c dengan isi lengkap
          # Gunakan tanda petik pada 'EOF' agar variabel tidak dieksekusi di shell
          cat << 'EOF' > cpu_oc_module/garnet_cpu_oc.c
          #include <linux/module.h>
          #include <linux/kernel.h>
          #include <linux/init.h>
          #include <linux/kprobes.h>

          static unsigned int silver_freq = 2000000;
          static unsigned int gold_freq = 2500000;

          static struct kprobe kp = { .symbol_name = "qcom_cpufreq_hw_cpu_init" };

          static int handler_pre(struct kprobe *p, struct pt_regs *regs) { return 0; }
          static void handler_post(struct kprobe *p, struct pt_regs *regs, unsigned long flags) {
              pr_info("Garnet OC: Override Target Silver: %u kHz, Gold: %u kHz\n", silver_freq, gold_freq);
          }

          static int __init garnet_oc_init(void) {
              kp.pre_handler = handler_pre;
              kp.post_handler = handler_post;
              return register_kprobe(&kp);
          }

          static void __exit garnet_oc_exit(void) { unregister_kprobe(&kp); }

          module_init(garnet_oc_init);
          module_exit(garnet_oc_exit);
          MODULE_LICENSE("GPL");
          MODULE_AUTHOR("Ridwan Farel");
          MODULE_DESCRIPTION("Garnet Overclock");
          EOF
          
          # 3. Buat Makefile yang sederhana
          echo "obj-m += garnet_cpu_oc.o" > cpu_oc_module/Makefile
          
          # 4. Masuk ke kernel source dan kompilasi
          cd kernel_source
          make ARCH=arm64 CROSS_COMPILE=aarch64-linux-gnu- gki_defconfig
          make ARCH=arm64 CROSS_COMPILE=aarch64-linux-gnu- prepare
          make ARCH=arm64 CROSS_COMPILE=aarch64-linux-gnu- M=$(pwd)/../cpu_oc_module modules
          
          

      - name: Package KernelSU Module
        run: |
          mkdir -p ksu_module/garnet_cpu_oc
          cp cpu_oc_module/garnet_cpu_oc.ko ksu_module/garnet_cpu_oc/
          
          echo -e "id=garnet_cpu_oc\nname=Garnet CPU Overclock (HW Inject)\nversion=1.1\nauthor=Ridwan Farel\ndescription=Modul Kprobe LUT Injection." > ksu_module/garnet_cpu_oc/module.prop
          
          cd ksu_module
          zip -r9 ../KSU-Garnet-OC.zip *

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: KSU-Garnet-OC
          path: KSU-Garnet-OC.zip
          
