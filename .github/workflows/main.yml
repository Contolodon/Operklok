name: Build CPU Overclock Module (Real HW LUT Injection)

on:
  workflow_dispatch:
    inputs:
      cpu_silver_max_freq: 
        description: 'CPU Silver (LITTLE) Max Freq Khz'
        required: true
        default: '2000000'
      cpu_gold_max_freq:
        description: 'CPU Gold (big) Max Freq kHz'
        required: true
        default: '2500000'

jobs:
  build-cpu-oc-module:
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Environment
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential gcc-aarch64-linux-gnu curl unzip

      - name: Clone Kernel Source
        run: |
          git clone --depth=1 https://github.com/ramabondanp/android_kernel_common-5.10.git kernel_source

      - name: Compile Module
        run: |
          # 1. Masuk ke direktori kernel source
          cd kernel_source
          
          # 2. Siapkan konfigurasi (Penting agar script/module.lds terbentuk)
          make ARCH=arm64 CROSS_COMPILE=aarch64-linux-gnu- gki_defconfig
          make ARCH=arm64 CROSS_COMPILE=aarch64-linux-gnu- prepare
          make ARCH=arm64 CROSS_COMPILE=aarch64-linux-gnu- scripts
          
          # 3. Pindahkan lokasi modul ke DALAM kernel_source agar terdeteksi dengan benar
          mkdir -p ../cpu_oc_module
          # (Salin file .c dan Makefile ke folder yang benar)
          cat << 'EOF' > ../cpu_oc_module/garnet_cpu_oc.c
          #include <linux/module.h>
          // ... (isi kode C kamu tetap sama)
          EOF
          echo "obj-m += garnet_cpu_oc.o" > ../cpu_oc_module/Makefile
          
          # 4. Compile dengan path M yang tepat di dalam tree
          make ARCH=arm64 CROSS_COMPILE=aarch64-linux-gnu- M=$(pwd)/../cpu_oc_module modules
          
          

      - name: Package KernelSU Module
        run: |
          mkdir -p ksu_module/garnet_cpu_oc
          cp cpu_oc_module/garnet_cpu_oc.ko ksu_module/garnet_cpu_oc/
          
          echo -e "id=garnet_cpu_oc\nname=Garnet CPU Overclock (HW Inject)\nversion=1.1\nauthor=Ridwan Farel\ndescription=Modul Kprobe LUT Injection." > ksu_module/garnet_cpu_oc/module.prop
          
          cd ksu_module
          zip -r9 ../KSU-Garnet-OC.zip *

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: KSU-Garnet-OC
          path: KSU-Garnet-OC.zip
          
