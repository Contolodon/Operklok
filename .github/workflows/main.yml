name: Build CPU Overclock Module (GKI 5.10)

on:
  workflow_dispatch:
    inputs:
      kernel_headers_url:
        description: 'URL artifact kernel headers dari workflow build kernel (atau kosongkan untuk build headers juga)'
        required: false
        type: string
      cpu_silver_max_freq: 
        description: 'CPU Silver (LITTLE) Max Freq Khz (stock: 1958000, max aman: 2000000)'
        required: true
        default: '2000000'
      cpu_gold_max_freq:
        description: 'CPU Gold (big) Max Freq kHz (stock 2400000, max aman: 2500000)'
        required: true
        default: '2500000'
      silver_opp_voltage:
        description: 'Silver Max OPP Voltage (uV, stock 744000, max aman: 760000)'
        required: true
        default: '760000'
      gold_opp_voltage:
        description: 'Gold Max OPP Voltage (uV, stock: 920000, max aman : 940000)'
        required: true
        default: '940000'
      module_name:
        description: 'Nama Module'
        required: true
        default: 'garnet_cpu_oc'

jobs:
  build-cpu-oc-module:
    runs-on: ubuntu-22.04
    timeout-minutes: 60

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Free Disk Space
        uses: jlumbroso/free-disk-space@main
        with:
          tool-cache: false
          android: true
          dotnet: true
          haskell: true
          large-packages: false
          docker-images: true
          swap-storage: false
          

      - name: Install Build Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential bc gcc-aarch64-linux-gnu \
            libssl-dev libfl-dev curl zip unzip lld llvm repo python3-pip \
            cpio kmod rsync xsltproc

      - name: Setup Swap Space (Anti-OOM)
        run: |
          sudo swapoff -a 2>/dev/null || true
          sudo rm -f /swapfile /swapfile1 2>/dev/null || true
          sudo dd if=/dev/zero of=/swapfile1 bs=1M count=4096 status=progress
          sudo chmod 600 /swapfile1
          sudo mkswap /swapfile1
          sudo swapon /swapfile1
          free -h

      - name: Sync GKI Kernel Source (untuk headers)
        run: |
          mkdir -p gki
          cd gki
          repo init -u https://android.googlesource.com/kernel/manifest \
            -b common-android12-5.10 --depth=1
          repo sync -c -j$(nproc) --no-tags --no-clone-bundle

      - name: Build Kernel Headers
        working-directory: gki
        run: |
          echo "Building kernel headers manually..."
          cd common
          
          # Bersihkan sisa-sisa build dan arahkan output ke gki/out
          make O=../out ARCH=arm64 CROSS_COMPILE=aarch64-linux-gnu- mrproper
          
          # Buat konfigurasi dasar GKI
          make O=../out ARCH=arm64 CROSS_COMPILE=aarch64-linux-gnu- gki_defconfig
          
          # Siapkan headers dan cetak Module.symvers
          make O=../out ARCH=arm64 CROSS_COMPILE=aarch64-linux-gnu- modules_prepare
          
          echo "✅ Headers ready:"
          cd ..
          find out -name "Module.symvers"


      - name: Create CPU Overclock Module Source
        run: |
          mkdir -p cpu_oc_module
          cd cpu_oc_module

          SILVER_MAX="${{ github.event.inputs.cpu_silver_max_freq }}"
          GOLD_MAX="${{ github.event.inputs.cpu_gold_max_freq }}"
          SILVER_V="${{ github.event.inputs.silver_opp_voltage }}"
          GOLD_V="${{ github.event.inputs.gold_opp_voltage }}"
          MOD_NAME="${{ github.event.inputs.module_name }}"

          echo "🗿 CPU OC Module Config:"
          echo "  Silver:  ${SILVER_MAX} kHz @ ${SILVER_V} uV"
          echo "  Gold:    ${GOLD_MAX} kHz @ ${GOLD_V} uV"

          # Menggunakan trik _TAB_ untuk menghindari error spasi di Makefile YAML
          cat > Makefile << 'MK_EOF'
          obj-m := garnet_cpu_oc.o

          KDIR ?= $(KERNEL_DIR)
          ARCH ?= arm64
          CROSS_COMPILE ?= aarch64-linux-gnu-

          all: module

          module:
          _TAB_$(MAKE) -C $(KDIR) M=$(PWD) ARCH=$(ARCH) CROSS_COMPILE=$(CROSS_COMPILE) modules

          clean:
          _TAB_$(MAKE) -C $(KDIR) M=$(PWD) ARCH=$(ARCH) CROSS_COMPILE=$(CROSS_COMPILE) clean
          MK_EOF
          
          # Mengubah placeholder menjadi Tab asli
          sed -i 's/^_TAB_/\t/g' Makefile

          cat > garnet_cpu_oc.c << 'C_EOF'
          /*
           * garnet_cpu_oc.c - CPU Overclock Module for Poco X6 5G (garnet)
           * Hooks qcom_cpufreq_hw_read_lut() via Kretprobe.
           */
          #include <linux/module.h>
          #include <linux/kernel.h>
          #include <linux/init.h>
          #include <linux/cpufreq.h>
          #include <linux/kprobes.h>
          #include <linux/ptrace.h>
          
          #define SILVER_MAX_FREQ   CONFIG_OC_SILVER_MAX
          #define GOLD_MAX_FREQ     CONFIG_OC_GOLD_MAX
          #define SILVER_MAX_VOLT   CONFIG_OC_SILVER_VOLT
          #define GOLD_MAX_VOLT     CONFIG_OC_GOLD_VOLT

          MODULE_LICENSE("GPL");
          MODULE_AUTHOR("Payel Kernel");           
          MODULE_DESCRIPTION("CPU Overclock for Poco X6 5G (garnet) via Kprobe");           
          MODULE_VERSION("1.1");
          
          struct oc_probe_data {
              struct cpufreq_policy *policy;
          };

          static int entry_handler(struct kretprobe_instance *ri, struct pt_regs *regs)
          {
              struct oc_probe_data *data = (struct oc_probe_data *)ri->data;
              data->policy = (struct cpufreq_policy *)regs->regs[0];
              return 0;
          }

          static int ret_handler(struct kretprobe_instance *ri, struct pt_regs *regs)
          {
              struct oc_probe_data *data = (struct oc_probe_data *)ri->data;
              struct cpufreq_policy *policy = data->policy;
              unsigned int cpu;

              if (!policy) return 0;
              cpu = policy->cpu;

              if (cpu <= 3) {
                  if (policy->max < SILVER_MAX_FREQ) {
                      pr_info("garnet_oc: [KPROBE] Override Silver CPU%d Max: %u -> %u kHz\n",
                          cpu, policy->max, SILVER_MAX_FREQ);
                      policy->max = SILVER_MAX_FREQ;
                      policy->cpuinfo.max_freq = SILVER_MAX_FREQ;
                  }
              } else if (cpu >= 4 && cpu <= 7) {
                  if (policy->max < GOLD_MAX_FREQ) {
                      pr_info("garnet_oc: [KPROBE] Override Gold CPU%d Max: %u -> %u kHz\n",
                          cpu, policy->max, GOLD_MAX_FREQ);
                      policy->max = GOLD_MAX_FREQ;
                      policy->cpuinfo.max_freq = GOLD_MAX_FREQ;
                  }
              }

              if (policy->freq_table) {
                  int i;
                  for (i = 0; policy->freq_table[i].frequency != CPUFREQ_TABLE_END; i++) {
                      if (cpu <= 3 && policy->freq_table[i].frequency >= policy->max) {
                          policy->freq_table[i].frequency = SILVER_MAX_FREQ;
                      } else if (cpu >= 4 && policy->freq_table[i].frequency >= policy->max) {
                          policy->freq_table[i].frequency = GOLD_MAX_FREQ;
                      }
                  }
              }
              return 0;
          }

          static struct kretprobe my_kretprobe = {
              .handler = ret_handler,
              .entry_handler = entry_handler,
              .data_size = sizeof(struct oc_probe_data),
              .maxactive = 12,
          };

          static int __init garnet_cpu_oc_init(void)
          {
              int ret;
              pr_info("garnet_cpu_oc: Initializing CPU Overclock Module\n");
              pr_info("garnet_cpu_oc: Target Silver=%u kHz, Gold=%u kHz\n", SILVER_MAX_FREQ, GOLD_MAX_FREQ);

              my_kretprobe.kp.symbol_name = "qcom_cpufreq_hw_read_lut";
              ret = register_kretprobe(&my_kretprobe);
              
              if (ret < 0) {
                  pr_err("garnet_cpu_oc: Failed to register kretprobe (%d)\n", ret);
                  return ret;
              }

              pr_info("garnet_cpu_oc: Kretprobe registered. REAL OVERCLOCK AKTIF!\n");
              return 0;
          }

          static void __exit garnet_cpu_oc_exit(void)
          {
              unregister_kretprobe(&my_kretprobe);
              pr_info("garnet_cpu_oc: Module unloaded.\n");
          }

          module_init(garnet_cpu_oc_init);
          module_exit(garnet_cpu_oc_exit);
          C_EOF

          cat > Kbuild << 'KB_EOF'
          obj-m := garnet_cpu_oc.o

          ccflags-y := -DCONFIG_OC_SILVER_MAX=$(SILVER_MAX) \
                       -DCONFIG_OC_GOLD_MAX=$(GOLD_MAX) \
                       -DCONFIG_OC_SILVER_VOLT=$(SILVER_VOLT) \
                       -DCONFIG_OC_GOLD_VOLT=$(GOLD_VOLT)
          KB_EOF

          sed -i "s/\$(SILVER_MAX)/\${SILVER_MAX}/g" Kbuild
          sed -i "s/\$(GOLD_MAX)/\${GOLD_MAX}/g" Kbuild
          sed -i "s/\$(SILVER_VOLT)/\${SILVER_VOLT}/g" Kbuild
          sed -i "s/\$(GOLD_VOLT)/\${GOLD_VOLT}/g" Kbuild

      - name: Compile CPU OC Module
        run: |
          echo "🔨 Compiling CPU OC module against GKI headers..."
          
          # Update path pencarian agar akurat di manapun Module.symvers berada
          KERNEL_DIR=$(find $GITHUB_WORKSPACE/gki -name "Module.symvers" -exec dirname {} \; | head -1)
          
          if [ -z "$KERNEL_DIR" ]; then
            echo "❌ Kernel build dir tidak ditemukan. Headers build gagal."
            exit 1
          fi

          echo "Kernel build dir: $KERNEL_DIR"
          
          cd cpu_oc_module
          make KERNEL_DIR="$KERNEL_DIR" ARCH=arm64 \
            CROSS_COMPILE=aarch64-linux-gnu- \
            CC=clang LLVM=1 2>&1 | tee module_build.log

          if [ -f "garnet_cpu_oc.ko" ]; then
            echo "✅ Module compiled successfully:"
            ls -lh garnet_cpu_oc.ko
          else
            echo "❌ Module build failed!"
            exit 1
          fi


      - name: Package KernelSU Module
        run: |
          MOD_NAME="${{ github.event.inputs.module_name }}"
          echo "📦 Packaging KernelSU module: $MOD_NAME"
          mkdir -p ksu_module/$MOD_NAME

          cp cpu_oc_module/garnet_cpu_oc.ko ksu_module/$MOD_NAME/

          cat > ksu_module/$MOD_NAME/module.prop << 'MP_EOF'
          id=garnet_cpu_oc
          name=Garnet CPU Overclock Kprobe
          version=v1.1
          versionCode=2
          author=Payel Kernel
          description=CPU Overclock for Poco X6 5G (garnet) using Kprobe software hooking.
          MP_EOF

          cat > ksu_module/$MOD_NAME/post-fs-data.sh << 'PFD_EOF'
          #!/system/bin/sh
          MODDIR=${0%/*}
          insmod $MODDIR/garnet_cpu_oc.ko 2>/dev/null || echo "garnet_cpu_oc: insmod failed" > /data/local/tmp/cpu_oc.log
          PFD_EOF
          chmod +x ksu_module/$MOD_NAME/post-fs-data.sh

          cat > ksu_module/$MOD_NAME/service.sh << 'SVC_EOF'
          #!/system/bin/sh
          MODDIR=${0%/*}
          until [ -d /sys/devices/system/cpu/cpu0/cpufreq ]; do
            sleep 2
          done
          sleep 3
          if ! lsmod | grep -q garnet_cpu_oc; then
            insmod $MODDIR/garnet_cpu_oc.ko 2>/dev/null
          fi
          SVC_EOF
          chmod +x ksu_module/$MOD_NAME/service.sh

          cd ksu_module
          TIMESTAMP=$(date +"%Y%m%d")
          ZIP_NAME="KSU-${MOD_NAME}-${TIMESTAMP}.zip"
          zip -r9 "../${ZIP_NAME}" "$MOD_NAME"
          cd ..
          echo "ZIP_NAME=${ZIP_NAME}" >> $GITHUB_ENV

      - name: Upload KSU Module
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.ZIP_NAME }}
          path: ${{ env.ZIP_NAME }}

      - name: Upload Build Logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: cpu-oc-build-logs
          path: |
            cpu_oc_module/module_build.log
            gki/headers_build.log
          if-no-files-found: warn
          
