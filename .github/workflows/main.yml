name: Build CPU Overclock Module (Real HW LUT Injection)

on:
  workflow_dispatch:
    inputs:
      cpu_silver_max_freq: 
        description: 'CPU Silver (LITTLE) Max Freq Khz'
        required: true
        default: '2000000'
      cpu_gold_max_freq:
        description: 'CPU Gold (big) Max Freq kHz'
        required: true
        default: '2500000'

jobs:
  build-cpu-oc-module:
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Environment
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential gcc-aarch64-linux-gnu curl unzip

      - name: Clone Kernel Source
        run: |
          git clone --depth=1 https://github.com/ramabondanp/android_kernel_common-5.10.git kernel_source

      - name: Compile Module
        run: |
          cd kernel_source
          
          # 1. Konfigurasi ulang agar benar-benar bersih
          make ARCH=arm64 CROSS_COMPILE=aarch64-linux-gnu- gki_defconfig
          
          # 2. Langkah vital: Pastikan semua header dan skrip siap
          make ARCH=arm64 CROSS_COMPILE=aarch64-linux-gnu- prepare
          make ARCH=arm64 CROSS_COMPILE=aarch64-linux-gnu- modules_prepare
          
          # 3. Buat direktori modul di luar
          cd ..
          mkdir -p cpu_oc_module
          cat << 'EOF' > cpu_oc_module/garnet_cpu_oc.c
          #include <linux/module.h>
          #include <linux/kernel.h>
          #include <linux/init.h>
          #include <linux/kprobes.h>
          static struct kprobe kp = { .symbol_name = "qcom_cpufreq_hw_cpu_init" };
          static int __init m_init(void) { return register_kprobe(&kp); }
          static void __exit m_exit(void) { unregister_kprobe(&kp); }
          module_init(m_init); module_exit(m_exit);
          MODULE_LICENSE("GPL");
          EOF
          
          # 4. Makefile ini krusial: gunakan path absolut ke kernel source yang sudah di-prepare
          echo "obj-m += garnet_cpu_oc.o" > cpu_oc_module/Makefile
          
          # 5. Compile: M harus mengarah ke direktori modul, KDIR ke direktori kernel yang sudah di-prepare
          make -C $(pwd)/kernel_source M=$(pwd)/cpu_oc_module ARCH=arm64 CROSS_COMPILE=aarch64-linux-gnu- modules
          
          

      - name: Package KernelSU Module
        run: |
          mkdir -p ksu_module/garnet_cpu_oc
          cp cpu_oc_module/garnet_cpu_oc.ko ksu_module/garnet_cpu_oc/
          
          echo -e "id=garnet_cpu_oc\nname=Garnet CPU Overclock (HW Inject)\nversion=1.1\nauthor=Ridwan Farel\ndescription=Modul Kprobe LUT Injection." > ksu_module/garnet_cpu_oc/module.prop
          
          cd ksu_module
          zip -r9 ../KSU-Garnet-OC.zip *

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: KSU-Garnet-OC
          path: KSU-Garnet-OC.zip
          
